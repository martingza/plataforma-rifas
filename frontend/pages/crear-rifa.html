                                <option value="1000">1000 números</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">

                        <input type="date" id="fechaSorteo" name="fechaSorteo" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="contactoWhatsApp">WhatsApp de Contacto</label>
                        <input type="tel" id="contactoWhatsApp" name="contactoWhatsApp" placeholder="+56 9 1234 5678">
                    </div>
                    
                    <div class="form-group">
                        <label for="instruccionesPago">Instrucciones de Pago</label>
                        <textarea id="instruccionesPago" name="instruccionesPago" rows="3" placeholder="Ej: Transferir a cuenta rut..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-rocket"></i> Crear Rifa
                    </button>
                </form>
            </div>
        </div>
    </section>

    <script src="../js/app.js"></script>
    <script>
        if (!isLoggedIn()) {
            window.location.href = '/pages/login.html';
        }

        // Fecha mínima: hoy
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('fechaSorteo').min = today;

        async function handleCrearRifa(e) {
            e.preventDefault();
            
            const rifaData = {
                titulo: document.getElementById('titulo').value,
                descripcion: document.getElementById('descripcion').value,
                premio: document.getElementById('premio').value,
                precioNumero: parseInt(document.getElementById('precioNumero').value),
                cantidadNumeros: parseInt(document.getElementById('cantidadNumeros').value),
                fechaSorteo: document.getElementById('fechaSorteo').value,
                configuracion: {
                    contactoWhatsApp: document.getElementById('contactoWhatsApp').value,
                    instruccionesPago: document.getElementById('instruccionesPago').value,
                    metodoPago: ['transferencia'],
                    colorPrimario: '#4F46E5',
                    colorSecundario: '#7C3AED'
                }
            };
            
            console.log('🎯 Creando rifa:', rifaData);
            
            const rifa = await crearRifa(rifaData);
            
            if (rifa) {
                setTimeout(() => {
                    window.location.href = '/pages/dashboard.html';
                }, 1500);
            }
        }
    </script>
</body>
</html>
