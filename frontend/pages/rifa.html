<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa - RifaApp</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/index.html" class="logo">
                <i class="fas fa-ticket-alt"></i> RifaApp
            </a>
            <div class="nav-links">
                <a href="/index.html" class="btn btn-outline">Volver al Inicio</a>
            </div>
        </div>
    </nav>

    <!-- Rifa Detail -->
    <section class="section">
        <div class="container">
            <div id="rifaDetail" class="auth-card" style="max-width: 800px; margin: 0 auto;">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Cargando rifa...
                </div>
            </div>
        </div>
    </section>

    <script src="../js/app.js"></script>
    <script>
        // Obtener slug de la URL
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');

        if (!slug) {
            document.getElementById('rifaDetail').innerHTML = '<p>Rifa no encontrada</p>';
        } else {
            loadRifa();
        }

        async function loadRifa() {
            const rifa = await getRifaPublica(slug);
            const container = document.getElementById('rifaDetail');

            if (!rifa) {
                container.innerHTML = '<p>Rifa no encontrada</p>';
                return;
            }

            // Generar tablero de números
            let numerosHTML = rifa.numeros.map(num => {
                let clase = 'numero-disponible';
                if (num.estado === 'reservado') clase = 'numero-reservado';
                if (num.estado === 'pagado') clase = 'numero-pagado';
                
                return `<button class="numero-btn ${clase}" 
                    onclick="reservar(${num.numero}, '${rifa._id}')"
                    ${num.estado !== 'disponible' ? 'disabled' : ''}>
                    ${num.numero}
                </button>`;
            }).join('');

            container.innerHTML = `
                <h1>${rifa.titulo}</h1>
                <p>${rifa.descripcion}</p>
                
                <div class="rifa-premio">
                    <h2><i class="fas fa-trophy"></i> Premio</h2>
                    <p style="font-size: 24px; font-weight: bold;">${rifa.premio}</p>
                </div>
                
                <div class="rifa-info-grid">
                    <div><i class="fas fa-tag"></i> Precio por número: <strong>$${rifa.precioNumero}</strong></div>
                    <div><i class="fas fa-calendar"></i> Sorteo: <strong>${new Date(rifa.fechaSorteo).toLocaleDateString('es-ES')}</strong></div>
                    <div><i class="fas fa-check-circle"></i> Disponibles: <strong>${rifa.numeros.filter(n => n.estado === 'disponible').length}</strong></div>
                </div>
                
                ${rifa.configuracion?.instruccionesPago ? `
                <div class="pago-info">
                    <h3><i class="fas fa-credit-card"></i> Instrucciones de Pago</h3>
                    <p>${rifa.configuracion.instruccionesPago}</p>
                </div>` : ''}
                
                ${rifa.configuracion?.contactoWhatsApp ? `
                <div class="whatsapp-info">
                    <h3><i class="fab fa-whatsapp"></i> Contacto</h3>
                    <p>${rifa.configuracion.contactoWhatsApp}</p>
                </div>` : ''}
                
                <h3><i class="fas fa-th"></i> Tablero de Números</h3>
                <div class="numeros-grid">
                    ${numerosHTML}
                </div>
                
                <div class="leyenda">
                    <span class="leyenda-item"><span class="numero-btn numero-disponible" style="display:inline-block;width:30px;height:30px;font-size:12px;"></span> Disponible</span>
                    <span class="leyenda-item"><span class="numero-btn numero-reservado" style="display:inline-block;width:30px;height:30px;font-size:12px;"></span> Reservado</span>
                    <span class="leyenda-btn numero-pagado" style="display:inline-block;width:30px;height:30px;font-size:12px;"></span> Pagado</span>
                </div>
            `;
        }

        async function reservar(numero, rifaId) {
            const nombre = prompt('Tu nombre:');
            if (!nombre) return;
            
            const telefono = prompt('Tu teléfono:');
            if (!telefono) return;
            
            const comprador = { nombre, telefono };
            
            const resultado = await reservarNumero(rifaId, numero, comprador);
            
            if (resultado) {
                loadRifa(); // Recargar la rifa
            }
        }
    </script>
</body>
</html>
