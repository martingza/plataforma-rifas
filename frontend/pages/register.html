<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - RifaApp</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/index.html" class="logo">
                <i class="fas fa-ticket-alt"></i> RifaApp
            </a>
            <div class="nav-links">
                <a href="/pages/login.html" class="btn btn-outline">Iniciar Sesión</a>
            </div>
        </div>
    </nav>

    <!-- Register Form -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-card">
                <h2><i class="fas fa-user-plus"></i> Registrarse</h2>
                <p>Crea tu cuenta gratuita</p>
                
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre completo">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="tu@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="telefono">Teléfono (opcional)</label>
                        <input type="tel" id="telefono" name="telefono" placeholder="+56 9 1234 5678">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres" minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label for="password2">Confirmar Contraseña</label>
                        <input type="password" id="password2" name="password2" required placeholder="Repite tu contraseña" minlength="6">
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-user-plus"></i> Crear Cuenta
                    </button>
                </form>
                
                <div class="auth-footer">
                    <p>¿Ya tienes cuenta? <a href="/pages/login.html">Inicia sesión aquí</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- ⚠️ ESTO ES LO QUE FALTABA -->
    <script src="../js/app.js"></script>
    <script>
        function handleRegister(e) {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const telefono = document.getElementById('telefono').value;
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            
            console.log('📝 Registrando:', { nombre, email });
            
            if (password !== password2) {
                showAlert('Las contraseñas no coinciden', 'error');
                return;
            }
            
            register(nombre, email, password, telefono);
        }
    </script>
</body>
</html>
